<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NYSC AI Chat Assistant</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: #0d1117;
        color: #e6edf3;
        height: 100vh;
        overflow: hidden;
        display: flex;
      }

      .container {
        display: flex;
        height: 100%;
        width: 100%;
      }

      .chat-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #0d1117;
      }

      .header {
        padding: 20px;
        border-bottom: 1px solid rgba(48, 54, 61, 0.8);
        background: #161b22;
      }

      .header h1 {
        font-size: 1.5em;
        font-weight: 600;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .message {
        display: flex;
        gap: 12px;
        margin-bottom: 8px;
      }

      .message.user {
        justify-content: flex-end;
      }

      .message.user .bubble {
        background: #1f6feb;
        color: white;
      }

      .message.ai .bubble {
        background: #1c2128;
        border: 1px solid rgba(48, 54, 61, 0.8);
      }

      .bubble {
        padding: 12px 16px;
        border-radius: 12px;
        max-width: 70%;
        word-wrap: break-word;
        line-height: 1.5;
      }

      .input-section {
        padding: 20px;
        border-top: 1px solid rgba(48, 54, 61, 0.8);
        background: #161b22;
      }

      .input-group {
        display: flex;
        gap: 10px;
      }

      textarea {
        flex: 1;
        padding: 12px;
        border: 1px solid rgba(48, 54, 61, 0.8);
        border-radius: 8px;
        background: #0d1117;
        color: #e6edf3;
        font-family: inherit;
        font-size: 14px;
        resize: none;
        max-height: 120px;
      }

      textarea::placeholder {
        color: #484f58;
      }

      button {
        padding: 12px 20px;
        background: #238636;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.2s;
      }

      button:hover {
        background: #2ea043;
      }

      button:disabled {
        background: #484f58;
        cursor: not-allowed;
      }

      .welcome {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 20px;
      }

      .welcome h2 {
        font-size: 2em;
      }

      .typing {
        display: flex;
        gap: 4px;
        padding: 12px 16px;
        background: #1c2128;
        border: 1px solid rgba(48, 54, 61, 0.8);
        border-radius: 12px;
        width: fit-content;
      }

      .typing span {
        width: 8px;
        height: 8px;
        background: #7d8590;
        border-radius: 50%;
        animation: bounce 1.4s infinite;
      }

      .typing span:nth-child(2) {
        animation-delay: 0.2s;
      }

      .typing span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          opacity: 0.3;
        }
        40% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="chat-container">
        <div class="header">
          <h1>NYSC AI Chat Assistant</h1>
        </div>

        <div class="messages" id="messages">
          <div class="welcome">
            <h2>Welcome!</h2>
            <p>Start a conversation about NYSC</p>
          </div>
        </div>

        <div class="input-section">
          <div class="input-group">
            <textarea
              id="input"
              placeholder="Ask anything about NYSC..."
              onkeypress="handleKeyPress(event)"
            ></textarea>
            <button onclick="sendMessage()" id="sendBtn">Send</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      let isTyping = false;
      const messagesDiv = document.getElementById("messages");
      const inputEl = document.getElementById("input");

      function handleKeyPress(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      }

      function showWelcome() {
        messagesDiv.innerHTML = `
    <div class="welcome">
      <h2>Welcome!</h2>
      <p>Start a conversation about NYSC</p>
    </div>
  `;
      }

      function addMessage(text, sender) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${sender}`;

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;

        msgDiv.appendChild(bubble);
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        // Remove welcome message if present
        const welcome = messagesDiv.querySelector(".welcome");
        if (welcome) welcome.remove();
      }

      function showTyping() {
        const msgDiv = document.createElement("div");
        msgDiv.className = "message ai";
        msgDiv.id = "typing-msg";
        msgDiv.innerHTML =
          '<div class="typing"><span></span><span></span><span></span></div>';
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }

      function removeTyping() {
        const typingMsg = document.getElementById("typing-msg");
        if (typingMsg) typingMsg.remove();
      }

      async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text || isTyping) return;

        inputEl.value = "";
        isTyping = true;
        document.getElementById("sendBtn").disabled = true;

        addMessage(text, "user");
        showTyping();

        try {
          const response = await fetch("/api/v1/chat/message/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message: text,
              language: "en",
              history: [],
            }),
          });

          const data = await response.json();
          removeTyping();

          if (data.error) {
            addMessage("Error: " + data.error, "ai");
          } else {
            addMessage(data.ai_response, "ai");
          }
        } catch (err) {
          removeTyping();
          console.error("Error:", err);
          addMessage("Sorry, I could not connect to the server.", "ai");
        } finally {
          isTyping = false;
          document.getElementById("sendBtn").disabled = false;
          inputEl.focus();
        }
      }

      // Initial message
      window.addEventListener("load", () => {
        setTimeout(() => {
          addMessage(
            "Hello! I'm your NYSC AI Assistant. How can I help you today?",
            "ai",
          );
        }, 500);
      });
    </script>
  </body>
</html>
