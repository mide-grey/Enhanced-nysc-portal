<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NYSC AI Portal – Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-box">
        <!-- Logo -->
        <div class="auth-logo">
          <div class="logo-badge">AI</div>
          <h1>NYSC AI Portal</h1>
          <p>Smart Assistant</p>
        </div>

        <!-- Tab Toggle -->
        <div class="tab-toggle">
          <button class="tab-btn active" data-tab="login">Login</button>
          <button class="tab-btn" data-tab="signup">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active-tab">
          <div class="form-group">
            <label>Email Address</label>
            <input
              type="email"
              id="loginEmail"
              placeholder="your@email.com"
              required
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="loginPassword"
              placeholder="••••••••"
              required
            />
          </div>
          <button type="submit" class="btn-submit">Login</button>
          <p class="form-link">
            Don't have an account?
            <span class="switch-tab" data-tab="signup">Sign Up</span>
          </p>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="auth-form">
          <div class="form-group">
            <label>Full Name</label>
            <input
              type="text"
              id="signupName"
              placeholder="Your Full Name"
              required
            />
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input
              type="email"
              id="signupEmail"
              placeholder="your@email.com"
              required
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="signupPassword"
              placeholder="••••••••"
              required
            />
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input
              type="password"
              id="signupConfirm"
              placeholder="••••••••"
              required
            />
          </div>
          <div class="form-group">
            <label>NYSC Batch</label>
            <select id="signupBatch" required>
              <option value="">Select Your Batch</option>
              <option value="Batch A 2025">Batch A 2025</option>
              <option value="Batch B 2025">Batch B 2025</option>
              <option value="Batch C 2025">Batch C 2025</option>
              <option value="Batch A 2024">Batch A 2024</option>
              <option value="Batch B 2024">Batch B 2024</option>
              <option value="Batch C 2024">Batch C 2024</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <button type="submit" class="btn-submit">Create Account</button>
          <p class="form-link">
            Already have an account?
            <span class="switch-tab" data-tab="login">Login</span>
          </p>
        </form>

        <!-- Language Selection -->
        <div class="auth-lang">
          <label>Language:</label>
          <div class="lang-buttons">
            <button class="lang-btn active" onclick="setLang('en')">EN</button>
            <button class="lang-btn" onclick="setLang('yo')">YO</button>
            <button class="lang-btn" onclick="setLang('ha')">HA</button>
          </div>
        </div>

        <!-- Error Message -->
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
      </div>

      <!-- Decorative Background -->
      <div class="auth-bg"></div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
